<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Weiß = sichtbar, Schwarz = durchsichtig (Loch) -->
    <mask id="cutout">
      <rect width="100" height="100" fill="white"/>
      <!-- X/Plus als Loch -->
      <g transform="translate(50 50) rotate(45)">
        <rect x="-12" y="-40" width="24" height="80" rx="4" fill="black"/>
        <rect x="-40" y="-12" width="80" height="24" rx="4" fill="black"/>
      </g>
    </mask>
  </defs>

  <!-- Schwarzes, abgerundetes Quadrat -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="currentColor" mask="url(#cutout)"/>
</svg>